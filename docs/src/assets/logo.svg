<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="Pro Components logo">
  <defs>
    <linearGradient id="logo-blue" x1="505" y1="130" x2="192" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25E5F3"/>
      <stop offset="0.44" stop-color="#129BFA"/>
      <stop offset="1" stop-color="#075FFF"/>
    </linearGradient>

    <linearGradient id="logo-red" x1="760" y1="260" x2="510" y2="890" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF765E"/>
      <stop offset="0.45" stop-color="#FF3938"/>
      <stop offset="1" stop-color="#F60418"/>
    </linearGradient>

    <linearGradient id="logo-fold-top" x1="595" y1="244" x2="610" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0634A9"/>
      <stop offset="0.52" stop-color="#0878F1"/>
      <stop offset="1" stop-color="#0042BA"/>
    </linearGradient>

    <linearGradient id="logo-fold-bottom" x1="438" y1="606" x2="424" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B8CFF"/>
      <stop offset="0.48" stop-color="#0053D7"/>
      <stop offset="1" stop-color="#00258E"/>
    </linearGradient>

    <filter id="logo-shadow" x="88" y="84" width="848" height="856" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#061846" flood-opacity="0.12"/>
    </filter>

    <clipPath id="logo-top-fold-clip">
      <path d="M500 280L584 216C620 198 660 216 696 252L746 302C682 304 636 346 620 432L500 328V280Z"/>
    </clipPath>

    <clipPath id="logo-bottom-fold-clip">
      <path d="M302 622C334 594 378 606 414 642L514 742L462 796C430 826 386 814 352 780L318 746C284 712 276 650 302 622Z"/>
    </clipPath>
  </defs>

  <g filter="url(#logo-shadow)">
    <path
      d="M650 286L512 146L160 512L512 878"
      stroke="url(#logo-blue)"
      stroke-width="148"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M512 878L864 512L672 302"
      stroke="url(#logo-red)"
      stroke-width="148"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <g clip-path="url(#logo-top-fold-clip)">
      <path
        d="M512 146L864 512"
        stroke="url(#logo-fold-top)"
        stroke-width="132"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </g>

    <g clip-path="url(#logo-bottom-fold-clip)">
      <path
        d="M160 512L512 878"
        stroke="url(#logo-fold-bottom)"
        stroke-width="132"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </g>
  </g>
</svg>
