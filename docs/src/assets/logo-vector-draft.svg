<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="Pro Components logo">
  <defs>
    <linearGradient id="logo-blue" x1="330" y1="150" x2="185" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28E6F2"/>
      <stop offset="0.45" stop-color="#119DFF"/>
      <stop offset="1" stop-color="#075CFF"/>
    </linearGradient>

    <linearGradient id="logo-red" x1="755" y1="255" x2="528" y2="884" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7B5C"/>
      <stop offset="0.48" stop-color="#FF3436"/>
      <stop offset="1" stop-color="#F50419"/>
    </linearGradient>

    <linearGradient id="logo-deep-blue" x1="540" y1="228" x2="424" y2="812" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0641B6"/>
      <stop offset="0.5" stop-color="#0878F7"/>
      <stop offset="1" stop-color="#002E9A"/>
    </linearGradient>

    <filter id="logo-soft-shadow" x="80" y="82" width="864" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#081B4C" flood-opacity="0.16"/>
    </filter>

    <filter id="logo-inner-edge" x="128" y="126" width="768" height="772" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#001A59" flood-opacity="0.24"/>
    </filter>

    <clipPath id="logo-upper-fold">
      <path d="M512 165L859 512" stroke="#fff" stroke-width="152" stroke-linecap="round"/>
    </clipPath>

    <clipPath id="logo-lower-fold">
      <path d="M165 512L512 859" stroke="#fff" stroke-width="152" stroke-linecap="round"/>
    </clipPath>
  </defs>

  <g filter="url(#logo-soft-shadow)">
    <path
      d="M512 165L165 512L512 859"
      stroke="url(#logo-blue)"
      stroke-width="152"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#logo-inner-edge)"
    />

    <path
      d="M512 859L859 512L512 165"
      stroke="url(#logo-red)"
      stroke-width="152"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#logo-inner-edge)"
    />

    <g clip-path="url(#logo-upper-fold)">
      <path
        d="M512 165L165 512L512 859"
        stroke="url(#logo-deep-blue)"
        stroke-width="152"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        d="M538 196C592 213 636 249 676 300"
        stroke="#031D72"
        stroke-width="24"
        stroke-linecap="round"
        opacity="0.16"
      />
    </g>

    <g clip-path="url(#logo-lower-fold)">
      <path
        d="M512 859L859 512L512 165"
        stroke="#0054D9"
        stroke-width="152"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.76"
      />
      <path
        d="M348 706C384 760 433 801 489 824"
        stroke="#001F7A"
        stroke-width="26"
        stroke-linecap="round"
        opacity="0.14"
      />
    </g>
  </g>
</svg>
